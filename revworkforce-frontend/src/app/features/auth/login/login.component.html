<div class="login-page">
  <div class="login-bg">
    <div class="grid-lines"></div>
  </div>

  <div class="login-card">
    <div class="login-brand">
      <div class="brand-icon">RW</div>
      <h1>RevWorkforce</h1>
      <p>Human Resource Management</p>
    </div>

    @if (error()) {
    <div class="alert alert-error">{{ error() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="login()">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" formControlName="email" placeholder="you&#64;revworkforce.com" autocomplete="email">
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
        <span class="error-msg">Valid email required</span>
        }
      </div>

      <div class="form-group">
        <label>Password</label>
        <input [type]="showPw() ? 'text' : 'password'" formControlName="password" placeholder="••••••••"
          autocomplete="current-password">
        @if (form.get('password')?.invalid && form.get('password')?.touched) {
        <span class="error-msg">Password required</span>
        }
      </div>

      <div class="show-pw" (click)="showPw.set(!showPw())">
        <input type="checkbox" [checked]="showPw()" readonly>
        <span>Show password</span>
      </div>

      <button type="submit" class="btn btn-primary btn-login" [disabled]="loading()">
        @if (loading()) {
        <span class="spinner" style="width:16px;height:16px;border-width:2px;"></span>
        Signing in...
        } @else {
        Sign In →
        }
      </button>
    </form>
