version: '3.8'

# ─── Production docker-compose (used on EC2) ──────────────────────
# Uses images from AWS ECR instead of building locally
# Set these env vars before running:
#   export ECR_REGISTRY=<account>.dkr.ecr.ap-south-1.amazonaws.com
#   export IMAGE_TAG=<git-commit-sha>

services:

  redis:
    image: redis:7-alpine
    container_name: revworkforce-redis
    restart: unless-stopped
    networks:
      - revworkforce-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  eureka-server:
    image: ${ECR_REGISTRY}/revworkforce-eureka-server:${IMAGE_TAG}
    container_name: eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - revworkforce-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  config-server:
    image: ${ECR_REGISTRY}/revworkforce-config-server:${IMAGE_TAG}
    container_name: config-server
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - revworkforce-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  auth-service:
    image: ${ECR_REGISTRY}/revworkforce-auth-service:${IMAGE_TAG}
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      # RDS Connection - overrides config-server values
      SPRING_DATASOURCE_URL: jdbc:mysql://${RDS_HOST}:3306/revworkforce_auth?useSSL=true&requireSSL=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${RDS_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${RDS_PASSWORD}
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - revworkforce-network

  employee-service:
    image: ${ECR_REGISTRY}/revworkforce-employee-service:${IMAGE_TAG}
    container_name: employee-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://${RDS_HOST}:3306/revworkforce_employees?useSSL=true&requireSSL=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${RDS_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${RDS_PASSWORD}
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - revworkforce-network

  leave-service:
    image: ${ECR_REGISTRY}/revworkforce-leave-service:${IMAGE_TAG}
    container_name: leave-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://${RDS_HOST}:3306/revworkforce_employees?useSSL=true&requireSSL=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${RDS_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${RDS_PASSWORD}
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - revworkforce-network

  performance-service:
    image: ${ECR_REGISTRY}/revworkforce-performance-service:${IMAGE_TAG}
    container_name: performance-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://${RDS_HOST}:3306/revworkforce_employees?useSSL=true&requireSSL=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${RDS_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${RDS_PASSWORD}
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - revworkforce-network

  api-gateway:
    image: ${ECR_REGISTRY}/revworkforce-api-gateway:${IMAGE_TAG}
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - revworkforce-network

networks:
  revworkforce-network:
    driver: bridge
